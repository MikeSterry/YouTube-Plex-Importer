<script>
document.addEventListener("DOMContentLoaded", () => {
  const tabButtons = document.querySelectorAll("[data-tab-target]");
  const tabPanels = document.querySelectorAll(".tab-panel");

  tabButtons.forEach((button) => {
    button.addEventListener("click", () => {
      const targetId = button.dataset.tabTarget;
      tabButtons.forEach((item) => item.classList.remove("is-active"));
      tabPanels.forEach((panel) => panel.classList.remove("is-active"));
      button.classList.add("is-active");
      document.getElementById(targetId)?.classList.add("is-active");
    });
  });

  const resultContainer = document.getElementById("job-result-container");

  if (resultContainer) {
    const jobId = resultContainer.dataset.jobId;

    if (jobId) {
      async function refreshJobCard() {
        try {
          const response = await fetch(`/jobs/${jobId}/fragment`, {
            cache: "no-store"
          });

          if (response.status === 404 || response.status === 410) {
            clearInterval(window.__jobCardPoller);
            resultContainer.innerHTML = `
              <section class="job-result-card job-result-card-missing">
                <h2>Job No Longer Available</h2>
                <p>This job could not be found anymore, so live polling has stopped.</p>
              </section>
            `;
            return;
          }

          if (!response.ok) {
            return;
          }

          resultContainer.innerHTML = await response.text();

          const card = resultContainer.querySelector("[data-job-status]");
          const status = card?.dataset.jobStatus;

          if (["finished", "failed", "stopped", "canceled"].includes(status)) {
            clearInterval(window.__jobCardPoller);
          }
        } catch (_error) {
          // Ignore transient polling issues.
        }
      }

      refreshJobCard();
      window.__jobCardPoller = setInterval(refreshJobCard, 3000);
    }
  }

  // keep the rest of the existing script below this unchanged
});
</script>
