<section
  class="panel poster-editor"
  data-poster-editor
  data-output-select-id="{{ output_select_id }}"
  data-poster-url-id="{{ poster_url_id }}"
>
  <div class="section-heading">
    <h2>Poster crop and zoom</h2>
    <p>Load a poster from a URL or pick an existing local poster and drag inside the frame to reposition it.</p>
  </div>

  <div class="poster-controls">
    <div class="field">
      <label for="{{ editor_prefix }}_poster_source_type">Poster source</label>
      <select
        id="{{ editor_prefix }}_poster_source_type"
        name="poster_source_type"
        data-poster-source-type>
        <option value="url">Remote URL</option>
        <option value="local">Existing local poster</option>
      </select>
    </div>

    <div class="field">
      <label for="{{ editor_prefix }}_local_poster_file">Local poster file</label>
      <select
        id="{{ editor_prefix }}_local_poster_file"
        name="local_poster_file"
        data-local-poster-file
        disabled>
        <option value="">Select a local poster file</option>
      </select>
    </div>

    <div class="field">
      <label for="{{ editor_prefix }}_poster_mode">Mode</label>
      <select id="{{ editor_prefix }}_poster_mode" name="poster_mode">
        <option value="cover">Cover / crop to fill</option>
        <option value="contain">Contain / allow black bars</option>
      </select>
    </div>

    <div class="field">
      <label for="{{ editor_prefix }}_poster_zoom">Zoom</label>
      <input
        id="{{ editor_prefix }}_poster_zoom"
        name="poster_zoom"
        type="range"
        min="0.5"
        max="2.5"
        step="0.01"
        value="1.0">
    </div>

    <div class="field">
      <label for="{{ editor_prefix }}_poster_offset_x">Horizontal position</label>
      <input
        id="{{ editor_prefix }}_poster_offset_x"
        name="poster_offset_x"
        type="range"
        min="0"
        max="1"
        step="0.01"
        value="0.5">
    </div>

    <div class="field">
      <label for="{{ editor_prefix }}_poster_offset_y">Vertical position</label>
      <input
        id="{{ editor_prefix }}_poster_offset_y"
        name="poster_offset_y"
        type="range"
        min="0"
        max="1"
        step="0.01"
        value="0.5">
    </div>
  </div>

  <div class="helper-copy">
    <p>Use Remote URL for new artwork, or switch to Existing local poster in Update mode to reuse poster files already in the output folder.</p>
  </div>

  <div class="poster-actions">
    <button class="secondary-button" type="button" data-reset-preview>Reset</button>
    <button class="secondary-button" type="button" data-refresh-preview>Refresh preview</button>
  </div>

  <div class="poster-preview-card" data-poster-preview>
    <div class="poster-preview-empty">No poster loaded yet.</div>
  </div>
</section>
